services:
  - type: web
    name: fitmatch-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        value: ./data/fitmatch.db
